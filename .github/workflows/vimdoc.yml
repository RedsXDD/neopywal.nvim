name: Gen Vimdoc

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Prevent from running on release commits.
  skip_on_release:
    name: Skip on Release
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(master)') }}
    runs-on: ubuntu-latest
    steps:
      - run: exit 0

  docs-build:
    runs-on: ubuntu-latest
    outputs:
      docs_matrix: ${{ steps.set-docs-matrix.outputs.docs_matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate docs/*.md file matrix
        id: set-docs-matrix
        run: |
          first=true
          json_array="[]"
          docs_matrix="[]"
          tmpfile="$(mktemp)"
          trap 'rm -rf "$tmpfile"' 0 1 15

          if [ -d "docs" ] && [ "$(ls -A docs/*.md 2>/dev/null)" ]; then
                  find ./docs -type f -name '*.md' 2>/dev/null >"$tmpfile"
                  while read -r file; do
                          if [ -f "$file" ]; then
                                  module="$file"
                                  output_module="$(basename "$file" .md).txt"
                                  section="$(basename "$file" .md)"
                                  desc="$(basename "$file" .md | sed 's/-/ /g; s/[^ ]*/\u&/g')"

                                  # Build JSON object manually
                                  json_object="{\"module\":\"$module\",\"output_module\":\"$output_module\",\"desc\":\"$desc\",\"section\":\"$section\"}"

                                  if [ "$first" = true ]; then
                                          first=false
                                          json_array="[$json_object"
                                  else
                                          json_array="$json_array,$json_object"
                                  fi
                          fi
                  done <"$tmpfile"

                  if [ "$first" = false ]; then
                          json_array="$json_array]"
                          docs_matrix="$json_array"
                  else
                          docs_matrix="[]"
                  fi
          fi

          echo "docs_matrix=$docs_matrix" >>$GITHUB_OUTPUT

  docs-multi:
    name: Gen docs/*.md
    needs: docs-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docs: ${{ fromJson(needs.docs-build.outputs.docs_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - run: mkdir -pv doc
      - name: Panvimdoc (${{ matrix.docs.module }})
        uses: kdheepak/panvimdoc@main
        with:
          toc: false
          demojify: true
          treesitter: true
          shiftheadinglevelby: -1
          version: "nvim >= 0.8.0"
          pandoc: ${{ matrix.docs.module }}
          vimdoc: ${{ matrix.docs.section }}
          description: ${{ matrix.docs.desc }}
      - name: Upload vimdoc artifact (./doc/${{ matrix.docs.output_module }})
        uses: actions/upload-artifact@v7
        with:
          name: vimdoc-${{ matrix.docs.output_module }}
          path: doc/${{ matrix.docs.output_module }}

  docs:
    needs:
      - docs-build
      - docs-multi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download vimdoc artifacts
        if: ${{ needs.docs-build.outputs.docs_matrix != '[]' }}
        uses: actions/download-artifact@v8
        with:
          pattern: vimdoc-*
          path: doc/
          merge-multiple: true
      - name: Panvimdoc (./README.md)
        uses: kdheepak/panvimdoc@main
        with:
          toc: true
          treesitter: true
          demojify: true
          vimdoc: neopywal
          pandoc: "README.md"
          version: "nvim >= 0.8.0"
          description: "(Neo)pywal for (Neo)vim"
      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: "stable"
      - run: nvim --version
      - name: Generate vim helptags
        run: |
          nvim --headless -c 'echo "Generating helptags ...\n"' -c 'helptags ./doc' -c 'echo "Helptags generated.\n"' -c 'quit'
      - if: ${{ !env.ACT }}
        name: Commit docs
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs(build): auto generate vimdocs"
          branch: ${{ github.head_ref }}
